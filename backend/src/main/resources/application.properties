# ===================================================================
# ONEC Pharma - Application Configuration
# ===================================================================

# Server
server.port=8080
spring.application.name=onec-pharma

# ===================================================================
# MySQL Database Configuration
# ===================================================================
# ===================================================================
# H2 Database Configuration (In-Memory Fallback)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:onec_pharma_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ===================================================================
# JWT Configuration
# ===================================================================
app.jwt.secret=OnecPharmaSecretKey2024VeryLongSecretKeyForJWTTokenGenerationAndValidation256BitsMinimum
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ===================================================================
# File Upload Configuration
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ===================================================================
# Swagger / OpenAPI Configuration
# ===================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# ===================================================================
# CORS Configuration
# ===================================================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===================================================================
# Logging
# ===================================================================
logging.level.com.onecpharma=DEBUG
logging.level.org.springframework.security=DEBUG

# ===================================================================
# Razorpay Credentials Configuration
# ===================================================================
app.razorpay.key-id=rzp_test_onec_pharma_demo_key
app.razorpay.key-secret=onec_pharma_demo_secret

